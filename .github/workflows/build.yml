name: Build 3DS ELF

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add devkitPro repo
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg

          echo "deb https://apt.devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list

          curl -fsSL https://apt.devkitpro.org/devkitpro-pub.gpg | sudo gpg --dearmor -o /usr/share/keyrings/devkitpro.gpg

          echo "deb [signed-by=/usr/share/keyrings/devkitpro.gpg] https://apt.devkitpro.org stable main" | sudo tee /etc/apt/sources.list.d/devkitpro.list

      - name: Install devkitPro + 3DS tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm 3ds-dev

      - name: Compile ELF
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=/opt/devkitpro/devkitARM

          arm-none-eabi-g++ \
            -I$DEVKITPRO/libctru/include \
            -O2 -Wall -std=c++17 \
            source/main.cpp \
            source/game.cpp \
            source/map.cpp \
            source/player.cpp \
            -L$DEVKITPRO/libctru/lib \
            -lctru -lm \
            -o Katto3DS.elf

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: Katto3DS
          path: Katto3DS.elf
