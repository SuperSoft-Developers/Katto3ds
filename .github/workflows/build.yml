name: Build 3DS (macOS + brew)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devkitPro via brew
        run: |
          brew tap devkitpro/devkitpro
          brew install devkitarm devkitpro-pacman

      - name: Install 3DS tools
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm 3ds-dev

      - name: Build ELF
        run: |
          export DEVKITPRO=$(brew --prefix devkitpro)
          export DEVKITARM=$DEVKITPRO/devkitARM

          arm-none-eabi-g++ \
            -I$DEVKITPRO/libctru/include \
            -O2 -std=c++17 \
            source/*.cpp \
            -L$DEVKITPRO/libctru/lib \
            -lctru -o Katto3DS.elf

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: Katto3DS
          path: Katto3DS.elf
