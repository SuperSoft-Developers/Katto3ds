name: Build 3DS ELF

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg ca-certificates

      - name: Add devkitPro repo
        run: |
          sudo mkdir -p /usr/share/keyrings

          curl -fsSL https://apt.devkitpro.org/devkitpro-pub.gpg \
          | sudo gpg --dearmor -o /usr/share/keyrings/devkitpro.gpg

          echo "deb [signed-by=/usr/share/keyrings/devkitpro.gpg] https://apt.devkitpro.org stable main" \
          | sudo tee /etc/apt/sources.list.d/devkitpro.list

      - name: Install devkitPro tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devkitpro-pacman

      - name: Install 3DS toolchain
        run: |
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm 3ds-dev

      - name: Build ELF
        run: |
          export DEVKITPRO=/opt/devkitpro

          arm-none-eabi-g++ \
            -I$DEVKITPRO/libctru/include \
            -O2 -std=c++17 \
            source/*.cpp \
            -L$DEVKITPRO/libctru/lib \
            -lctru -o Katto3DS.elf

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: Katto3DS
          path: Katto3DS.elf
